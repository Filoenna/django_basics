<form [formGroup]="partForm" (ngSubmit)="onSubmit()" style="margin-bottom: 30px; border: 2px dashed #666; padding: 15px; border-radius: 8px;">
  
  <div style="margin-bottom: 10px;">
    <label>Nazwa części:</label><br>
    <input type="text" formControlName="name">
  </div>

  <div style="margin-bottom: 10px;">
    <label>Numer seryjny:</label><br>
    <input type="text" formControlName="serial_number">
  </div>

  <div style="margin-bottom: 10px;">
    <label>ID Wolnej Specyfikacji (Liczba):</label><br>
    <input type="number" formControlName="specification">
  </div>

  <button type="submit" [disabled]="partForm.invalid">Zapisz w Django</button>
</form>
