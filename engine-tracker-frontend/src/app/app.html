<h1>System Engine Tracker</h1>
<hr>

<h2>Dodaj nową część:</h2>
<app-part-form />
<app-specification-form />

<hr>

<h2>Lista zarejestrowanych części:</h2>

@for (part of parts(); track part.id) {
  <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
    <h3>⚙️ {{ part.name }}</h3>
    <p><strong>Numer seryjny:</strong> {{ part.serial_number }}</p>
  </div>
} @empty {
  <p>Brak części w bazie danych lub trwa ładowanie...</p>
}
